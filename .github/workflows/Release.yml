name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag matches __version__
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER=$(python3 -c "import re; m=re.search(r'__version__\s*=\s*\"([^\"]+)\"', open('wavebreaker.py').read()); print(m.group(1))")
          if [ "$TAG" != "$VER" ]; then
            echo "Tag $TAG does not match __version__ $VER"
            exit 1
          fi

      - name: Build tarball
        run: |
          mkdir -p dist
          tar -czf dist/wavebreaker-${GITHUB_REF_NAME}.tar.gz \
            wavebreaker.py README.md LICENSE SECURITY.md

      - name: Compute SHA256
        run: sha256sum dist/wavebreaker-*.tar.gz > dist/SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/wavebreaker-*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
